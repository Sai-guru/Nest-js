version: "3.9"

services:
  # Development container
  nestjs-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: nestjs-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    command: pnpm run dev
    restart: unless-stopped

